name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run db:generate
        env:
          DATABASE_URL: postgresql://fake:fake@localhost:5432/fake
      - run: npm run lint

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run db:generate
        env:
          DATABASE_URL: postgresql://fake:fake@localhost:5432/fake
      - run: npm run test:unit -- --coverage
      - uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: test
    env:
      DATABASE_URL: postgresql://fake:fake@localhost:5432/fake
      NEXT_PUBLIC_SUPABASE_URL: https://fake.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: fake_key
      SUPABASE_SERVICE_ROLE_KEY: fake_service_key
      ANTHROPIC_API_KEY: fake_anthropic_key
      GOOGLE_GENERATIVE_AI_API_KEY: fake_google_key
      UPSTASH_REDIS_REST_URL: https://fake.upstash.io
      UPSTASH_REDIS_REST_TOKEN: fake_token
      FAST2SMS_API_KEY: fake_sms_key
      NEXT_PUBLIC_APP_URL: https://ai-tutor.vercel.app
      NEXTAUTH_SECRET: fake_secret_for_build_only
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run db:generate
      - run: npm run build
